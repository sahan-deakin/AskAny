version: '3.8'
services:
  app:
    image: askany:${VERSION:-latest}
    container_name: askany-production
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=askany-prod-secret
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
