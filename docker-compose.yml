version: '3.8'
services:
  app:
    build: .
    container_name: askany-staging
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=staging
      - JWT_SECRET=askany-staging-secret
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
